<!DOCTYPE html>

<html>
<head>
  <title>Dashboard Zona PKS</title>
  <meta charset="utf-8">

  <!-- Google Maps -->

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCiM9i0KJeHPbXxyvryiN6mJ2JrJQtcvOQ"></script>

  <!-- Chart -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- CSV -->

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

  <style>
    body { margin:0; font-family:Arial; }

    #map { height: 70vh; }

    .topbar {
      display:flex;
      gap:20px;
      padding:10px;
      background:#f5f5f5;
      flex-wrap:wrap;
    }

    .box {
      background:white;
      padding:10px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }
  </style>

</head>

<body>

<div class="topbar">

  <div class="box">
    <b>KPI</b><br>
    Total: <span id="totalSuara">0</span><br>
    Target: <span id="totalTarget">0</span><br>
    Gap: <span id="totalGap">0</span>
  </div>

<canvas id="chartZona" width="200"></canvas> <canvas id="chartKecamatan" width="300"></canvas>

  <div class="box">
    <button onclick="showKecamatan()">🏠 Kecamatan</button><br><br>
    <button onclick="back()">⬅️ Back</button>
  </div>

</div>

<div id="map"></div>

<script>
let map;
let markers = [];
let allData = [];
let currentKec = null;
let currentDesa = null;
let level = "kecamatan";

function initMap(){
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 9,
    center: { lat: 1.0, lng: 103.5 }
  });

  loadData();
}

function loadData(){
  Papa.parse("./data.csv", {
    download:true,
    header:true,
    complete:(res)=>{
      allData = res.data;
      calculateAnalytics(allData);
      showKecamatan();
    }
  });
}

function clearMarkers(){
  markers.forEach(m=>m.setMap(null));
  markers=[];
}

function calculateAnalytics(data){
  let total=0,target=0,gap=0;
  let zona={merah:0,kuning:0,hijau:0};
  let kec={};

  data.forEach(r=>{
    total+=Number(r.Suara_PKS||0);
    target+=Number(r.Target_PKS_2029||0);
    gap+=Number(r.Gap_Menuju_Juara_2029||0);

    let z=(r.Zona||"").toLowerCase();
    if(zona[z]!=undefined) zona[z]++;

    kec[r.kecamatan]=(kec[r.kecamatan]||0)+Number(r.Suara_PKS||0);
  });

  totalSuara.innerText=total;
  totalTarget.innerText=target;
  totalGap.innerText=gap;

  new Chart(chartZona,{
    type:"pie",
    data:{
      labels:["Merah","Kuning","Hijau"],
      datasets:[{data:[zona.merah,zona.kuning,zona.hijau],
      backgroundColor:["red","orange","green"]}]
    }
  });

  new Chart(chartKecamatan,{
    type:"bar",
    data:{
      labels:Object.keys(kec),
      datasets:[{label:"PKS",data:Object.values(kec)}]
    }
  });
}

// LEVEL 1
function showKecamatan(){
  level="kecamatan";
  clearMarkers();

  let group={};

  allData.forEach(r=>{
    let k=r.kecamatan;
    if(!group[k]){
      group[k]={total:0,lat:parseFloat(r.latitude),lng:parseFloat(r.longitude)};
    }
    group[k].total+=Number(r.Suara_PKS||0);
  });

  for(let k in group){
    let g=group[k];

    let m=new google.maps.Marker({
      position:{lat:g.lat,lng:g.lng},
      map:map,
      label:"K"
    });

    m.addListener("click",()=>{
      currentKec=k;
      showDesa(k);
    });

    markers.push(m);
  }
}

// LEVEL 2
function showDesa(kec){
  level="desa";
  clearMarkers();

  let data=allData.filter(d=>d.kecamatan===kec);
  let group={};

  data.forEach(r=>{
    let d=r.desa;
    if(!group[d]){
      group[d]={total:0,lat:parseFloat(r.latitude),lng:parseFloat(r.longitude)};
    }
    group[d].total+=Number(r.Suara_PKS||0);
  });

  for(let d in group){
    let g=group[d];

    let m=new google.maps.Marker({
      position:{lat:g.lat,lng:g.lng},
      map:map,
      label:"D"
    });

    m.addListener("click",()=>{
      currentDesa=d;
      showTPS(kec,d);
    });

    markers.push(m);
  }
}

// LEVEL 3
function showTPS(kec,desa){
  level="tps";
  clearMarkers();

  let data=allData.filter(d=>d.kecamatan===kec && d.desa===desa);

  data.forEach(r=>{
    let m=new google.maps.Marker({
      position:{lat:parseFloat(r.latitude),lng:parseFloat(r.longitude)},
      map:map
    });

    let html="<div style='font-size:12px'>";
    for(let key in r){
      html+="<b>"+key+":</b> "+r[key]+"<br>";
    }
    html+="</div>";

    let inf=new google.maps.InfoWindow({content:html});
    m.addListener("click",()=>inf.open(map,m));

    markers.push(m);
  });
}

function back(){
  if(level==="tps") showDesa(currentKec);
  else if(level==="desa") showKecamatan();
}

window.onload=initMap;
</script>

</body>
</html>
