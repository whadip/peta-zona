<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Zona PKS</title>
  <meta charset="utf-8">

  <!-- Google Maps -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCiM9i0KJeHPbXxyvryiN6mJ2JrJQtcvOQ"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- CSV -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

  <style>
    body { margin:0; font-family:Arial; }

    #map { height: 65vh; }

    .topbar {
      display:flex;
      align-items:center;
      gap:15px;
      padding:10px;
      background:#f5f5f5;
      flex-wrap:wrap;
    }

    .box {
      background:white;
      padding:10px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .box canvas {
      width:220px !important;
      height:150px !important;
    }

    .kpi {
      min-width:150px;
    }

  </style>
</head>

<body>

<div class="topbar">

  <!-- KPI -->
  <div class="box kpi">
    <b>KPI</b><br>
    Total: <span id="totalSuara">0</span><br>
    Target: <span id="totalTarget">0</span><br>
    Gap: <span id="totalGap">0</span>
  </div>

  <!-- PIE -->
  <div class="box">
    <canvas id="chartZona"></canvas>
  </div>

  <!-- BAR -->
  <div class="box">
    <canvas id="chartKecamatan"></canvas>
  </div>

  <!-- NAV -->
  <div class="box">
    <button onclick="showKecamatan()">🏠 Kecamatan</button><br><br>
    <button onclick="back()">⬅️ Back</button>
  </div>

</div>

<div id="map"></div>

<script>
let map;
let markers = [];
let allData = [];
let currentKec = null;
let currentDesa = null;
let level = "kecamatan";

function initMap(){
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 9,
    center: { lat: 1.0, lng: 103.5 }
  });

  loadData();
}

function loadData(){
  Papa.parse("./data.csv", {
    download:true,
    header:true,
    complete:(res)=>{
      allData = res.data;
      calculateAnalytics(allData);
      showKecamatan();
    }
  });
}

function clearMarkers(){
  markers.forEach(m=>m.setMap(null));
  markers=[];
}

// ================= ANALYTICS =================
function calculateAnalytics(data){
  let total=0,target=0,gap=0;
  let zona={merah:0,kuning:0,hijau:0};
  let kec={};

  data.forEach(r=>{
    total+=Number(r.Suara_PKS||0);
    target+=Number(r.Target_PKS_2029||0);
    gap+=Number(r.Gap_Menuju_Juara_2029||0);

    let z=(r.Zona||"").toLowerCase();
    if(zona[z]!=undefined) zona[z]++;

    kec[r.kecamatan]=(kec[r.kecamatan]||0)+Number(r.Suara_PKS||0);
  });

  document.getElementById("totalSuara").innerText=total;
  document.getElementById("totalTarget").innerText=target;
  document.getElementById("totalGap").innerText=gap;

  // PIE
  new Chart(document.getElementById("chartZona"),{
    type:"pie",
    data:{
      labels:["Merah","Kuning","Hijau"],
      datasets:[{
        data:[zona.merah,zona.kuning,zona.hijau],
        backgroundColor:["red","orange","green"]
      }]
    },
    options:{
      responsive:false,
      maintainAspectRatio:false
    }
  });

  // BAR
  new Chart(document.getElementById("chartKecamatan"),{
    type:"bar",
    data:{
      labels:Object.keys(kec),
      datasets:[{
        label:"PKS",
        data:Object.values(kec),
        backgroundColor:"#4e79a7"
      }]
    },
    options:{
      responsive:false,
      maintainAspectRatio:false
    }
  });
}

// ================= MAP LEVEL =================

// LEVEL 1
function showKecamatan(){
  level="kecamatan";
  clearMarkers();

  let group={};

  allData.forEach(r=>{
    let k=r.kecamatan;
    if(!group[k]){
      group[k]={total:0,lat:parseFloat(r.latitude),lng:parseFloat(r.longitude)};
    }
    group[k].total+=Number(r.Suara_PKS||0);
  });

  for(let k in group){
    let g=group[k];

    let m=new google.maps.Marker({
      position:{lat:g.lat,lng:g.lng},
      map:map,
      label:"K"
    });

    m.addListener("click",()=>{
      currentKec=k;
      showDesa(k);
    });

    markers.push(m);
  }
}

// LEVEL 2
function showDesa(kec){
  level="desa";
  clearMarkers();

  let data=allData.filter(d=>d.kecamatan===kec);
  let group={};

  data.forEach(r=>{
    let d=r.desa;
    if(!group[d]){
      group[d]={total:0,lat:parseFloat(r.latitude),lng:parseFloat(r.longitude)};
    }
    group[d].total+=Number(r.Suara_PKS||0);
  });

  for(let d in group){
    let g=group[d];

    let m=new google.maps.Marker({
      position:{lat:g.lat,lng:g.lng},
      map:map,
      label:"D"
    });

    m.addListener("click",()=>{
      currentDesa=d;
      showTPS(kec,d);
    });

    markers.push(m);
  }
}

// LEVEL 3
function showTPS(kec,desa){
  level="tps";
  clearMarkers();

  let data=allData.filter(d=>d.kecamatan===kec && d.desa===desa);

  data.forEach(r=>{
    let m=new google.maps.Marker({
      position:{lat:parseFloat(r.latitude),lng:parseFloat(r.longitude)},
      map:map
    });

    let html="<div style='font-size:12px'>";
    for(let key in r){
      html+="<b>"+key+":</b> "+r[key]+"<br>";
    }
    html+="</div>";

    let inf=new google.maps.InfoWindow({content:html});
    m.addListener("click",()=>inf.open(map,m));

    markers.push(m);
  });
}

// NAV
function back(){
  if(level==="tps") showDesa(currentKec);
  else if(level==="desa") showKecamatan();
}

window.onload=initMap;
</script>

</body>
</html>
