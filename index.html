<!DOCTYPE html>

<html>
<head>
  <title>Dashboard Peta Zona</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->

 <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Marker Cluster -->

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <!-- PapaParse -->

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

  <style>
    #map { height: 100vh; }
    .control {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      z-index: 1000;
      border-radius: 10px;
    }
  </style>

</head>

<body>

<div class="control">
  <b>Zona</b><br>
  <button onclick="setZona('all')">Semua</button>
  <button onclick="setZona('merah')">Merah</button>
  <button onclick="setZona('kuning')">Kuning</button>
  <button onclick="setZona('hijau')">Hijau</button>

  <br><br>
  <b>Kecamatan</b><br>
  <select id="kecamatanFilter" onchange="filterData()">
    <option value="all">Semua</option>
  </select>

  <br><br>
  <div id="infoCount"><b>Total:</b> 0</div>
</div>

<!-- ✅ TAMBAHKAN DI SINI (TEPAT DI BAWAH CONTROL) -->
<div class="control" style="top:140px;">
  <b>Legenda</b><br>
  🔴 Merah<br>
  🟠 Kuning<br>
  🟢 Hijau
</div>

<div id="map"></div>

<script>
  var map = L.map('map').setView([1.0, 103.5], 9);

  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  var markers = L.markerClusterGroup();
  var allData = [];
  var currentZona = "all";

  function getColor(zona) {
    zona = zona.toLowerCase();
    if (zona.includes("merah")) return "red";
    if (zona.includes("kuning")) return "orange";
    if (zona.includes("hijau")) return "green";
    return "gray";
  }

  function loadData() {
    Papa.parse("./data.csv", {
      download: true,
      header: true,
      complete: function(results) {
        allData = results.data;
        populateKecamatan();
        filterData();
      }
    });
  }

  function populateKecamatan() {
    let select = document.getElementById("kecamatanFilter");
    let kecList = [...new Set(allData.map(d => d.kecamatan))];

    kecList.forEach(kec => {
      let opt = document.createElement("option");
      opt.value = kec;
      opt.text = kec;
      select.appendChild(opt);
    });
  }

  function setZona(z) {
    currentZona = z;
    filterData();
  }

  function filterData() {
    let kec = document.getElementById("kecamatanFilter").value;

    let filtered = allData.filter(d => {

      let zonaMatch = currentZona === "all" || d.Zona.toLowerCase().includes(currentZona);
      let kecMatch = kec === "all" || d.kecamatan === kec;

      return zonaMatch && kecMatch;
    });

    showMarkers(filtered);
  }

  function showMarkers(data) {
    document.getElementById("infoCount").innerHTML =
  "<b>Total:</b> " + data.length;
    markers.clearLayers();

    data.forEach(row => {

      if (!row.latitude || !row.longitude) return;

      let marker = L.circleMarker([
        parseFloat(row.latitude),
        parseFloat(row.longitude)
      ], {
        color: getColor(row.Zona),
        radius: 6
      });

        markers.addLayer(marker);
    });

    map.addLayer(markers);
  }

   let popup = `
<div style="
  font-family: Arial;
  font-size: 13px;
  line-height: 1.5;
  min-width:200px;
">
  <b style="font-size:14px;">${row.desa}</b><br>
  <span style="color:gray">${row.kecamatan}</span>
  <hr>

  <b>Zona:</b> <span style="color:${getColor(row.Zona)}">${row.Zona}</span><br>
`;

for (let key in row) {
  if (!["desa","kecamatan","Zona","latitude","longitude"].includes(key)) {
    popup += `<b>${key}:</b> ${row[key]}<br>`;
  }
}

popup += "</div>";

marker.bindPopup(popup);

       marker.bindPopup(popup);
      );

    

  loadData();
</script>

</body>
</html>
